{% load i18n %}
<!-- Actions Bar -->
<div style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;background:#f9fafb;border-bottom:1px solid #f3f4f6;font-size:0.875rem;">
    {% if action_form %}
    <!-- Action Label -->
    <label for="action-toggle" style="font-weight:500;color:#6b7280;white-space:nowrap;">Aksi massal:</label>

    <!-- Action Select -->
    {{ action_form.action }}

    <!-- Run Action Button -->
    <button type="submit" name="index" value="{{ action_index|default:0 }}" title="{% translate 'Run the selected action' %}" style="padding:0.4rem 0.875rem;background:#e11d48;color:#fff;border:none;border-radius:0.375rem;font-size:0.8125rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;" onmouseover="this.style.background='#be123c'" onmouseout="this.style.background='#e11d48'">
        Jalankan
    </button>

    <!-- Result Count -->
    {% if cl.result_count %}
    <span style="color:#6b7280;font-size:0.8125rem;">
        {{ cl.result_count }} data {% if cl.result_count != cl.full_result_count %}dari {{ cl.full_result_count }}{% endif %}
    </span>
    {% endif %}
    {% endif %}
</div>
